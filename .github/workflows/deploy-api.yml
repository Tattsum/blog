# Cloud Run（API）へのデプロイ。
# 必要な GitHub Secrets: GCP_PROJECT_ID, GCP_SA_KEY
# マイグレーション用: MIGRATION_PASSWORD（推奨・migrate のパスワード＝tfvars の db_root_password。URL エンコード不要）または MIGRATION_DSN（全文を指定する場合）
# 任意: GCP_REGION（未設定時は asia-northeast1）、IMAGE_NAME（Artifact イメージ名・既定 blog-api）
# 任意: CLOUD_RUN_SERVICE_NAME（未設定時は blog-backend。terraform.tfvars の cloud_run_service_name と揃える）
# デプロイ用サービスアカウントに Cloud SQL Client ロールが必要（マイグレーション実行のため）。
name: Deploy API (Cloud Run)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "proto/**"
      - "go.mod"
      - "go.sum"
      - "backend/Dockerfile"

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    env:
      REGION: ${{ secrets.GCP_REGION || 'asia-northeast1' }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      CONNECTION_NAME: ${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION || 'asia-northeast1' }}:blog-mysql
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Run migrations (Cloud SQL Proxy + golang-migrate)
        env:
          MIGRATION_PASSWORD: ${{ secrets.MIGRATION_PASSWORD }}
          MIGRATION_DSN: ${{ secrets.MIGRATION_DSN }}
        run: |
          set -e
          # MIGRATION_PASSWORD があれば DSN を組み立て（パスワードを URL エンコード）。なければ MIGRATION_DSN をそのまま使用
          if [ -n "$MIGRATION_PASSWORD" ]; then
            MIGRATION_DSN="mysql://migrate:$(python3 -c "import urllib.parse, os; p=os.environ.get('MIGRATION_PASSWORD',''); print(urllib.parse.quote(p, safe=''))")@tcp(127.0.0.1:3306)/blog?parseTime=true"
          fi
          if [ -z "$MIGRATION_DSN" ]; then
            echo "MIGRATION_PASSWORD or MIGRATION_DSN not set, skipping migrations"
            exit 0
          fi
          # Cloud SQL Auth Proxy をダウンロード
          PROXY_VER="2.14.2"
          curl -sSLo cloud-sql-proxy "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v${PROXY_VER}/cloud-sql-proxy.linux.amd64"
          chmod +x cloud-sql-proxy
          # プロキシを起動（バックグラウンド）
          ./cloud-sql-proxy --port 3306 "$CONNECTION_NAME" &
          PROXY_PID=$!
          trap "kill $PROXY_PID 2>/dev/null || true" EXIT
          sleep 5
          # golang-migrate でマイグレーション実行
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.18.0/migrate.linux-amd64.tar.gz | tar xz -C /tmp
          /tmp/migrate -path backend/db/migrations -database "$MIGRATION_DSN" up
          kill $PROXY_PID 2>/dev/null || true

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION || 'asia-northeast1' }}-docker.pkg.dev --quiet

      - name: Build and Push
        env:
          REGION: ${{ secrets.GCP_REGION || 'asia-northeast1' }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME || 'blog-api' }}
        run: |
          docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/blog-repo/${IMAGE_NAME}:${GITHUB_SHA} -f backend/Dockerfile .
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/blog-repo/${IMAGE_NAME}:${GITHUB_SHA}

      - name: Deploy to Cloud Run
        env:
          REGION: ${{ secrets.GCP_REGION || 'asia-northeast1' }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME || 'blog-api' }}
          SERVICE_NAME: ${{ secrets.CLOUD_RUN_SERVICE_NAME || 'blog-backend' }}
        run: |
          # SERVICE_NAME は terraform.tfvars の cloud_run_service_name と一致させること。
          # --port=8080 はコンテナの待ち受けポート。PORT を env で渡すと予約名で失敗するため渡さない。
          gcloud run deploy ${SERVICE_NAME} \
            --project=${PROJECT_ID} \
            --image=${REGION}-docker.pkg.dev/${PROJECT_ID}/blog-repo/${IMAGE_NAME}:${GITHUB_SHA} \
            --platform=managed \
            --region=${REGION} \
            --allow-unauthenticated \
            --port=8080 \
            --add-cloudsql-instances=${PROJECT_ID}:${REGION}:blog-mysql \
            --set-secrets=DATABASE_DSN=DATABASE_DSN:latest,ADMIN_API_KEY=ADMIN_API_KEY:latest \
            --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${REGION}
