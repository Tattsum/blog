syntax = "proto3";

package blog.v1;

option go_package = "github.com/Tattsum/blog/gen/blog/v1;blogv1";

message SummarizeRequest {
  string text = 1;
  int32 max_sentences = 2;
}

message SummarizeResponse {
  string summary = 1;
}

message DraftSupportRequest {
  string prompt = 1;
  string current_body = 2;
}

message DraftSupportResponse {
  string suggested_body = 1;
}

service AIService {
  rpc Summarize(SummarizeRequest) returns (SummarizeResponse) {}
  rpc DraftSupport(DraftSupportRequest) returns (DraftSupportResponse) {}
}
